<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>First admin setup | Book with Kerrie</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="card auth-card">
      <img class="auth-logo" src="{{ brand.logo_url if brand else url_for('static', filename='logo.svg') }}" alt="logo">
      <p class="eyebrow">First-time setup</p>
      <h1>Create the first admin</h1>
      <p class="lead">This page only appears until the first admin is created in city.db.</p>
      <form method="post" class="stack-form">
        <label>Full name<input name="full_name" required></label>
        <label>Username<input name="username" required></label>
        <label>Password<input type="password" name="password" required></label>
        <button class="btn primary" type="submit">Create admin</button>
      </form>
    </section>
  </main>
</body>
</html>
