{% extends 'admin/base.html' %}
{% block content %}
<div class="panel admin-panel">
  <div class="section-headline">Public brand settings</div>
  <form method="post" enctype="multipart/form-data" class="stack-form settings-form">
    <label>Brand name<input name="brand_name" value="{{ settings.brand_name }}" required></label>
    <label>Brand tagline<textarea name="brand_tagline" rows="2" required>{{ settings.brand_tagline }}</textarea></label>
    <label>Support phone<input name="support_phone" value="{{ settings.support_phone }}" required></label>
    <label>Support email<input name="support_email" value="{{ settings.support_email }}" required></label>
    <label>About text<textarea name="about_text" rows="3" required>{{ settings.about_text }}</textarea></label>
    <label>Business card text<textarea name="business_card_text" rows="2" required>{{ settings.business_card_text }}</textarea></label>
    <label>QR label<input name="qr_label" value="{{ settings.qr_label }}" required></label>
    <label>User navigation style
      <select name="public_ui_style">
        <option value="ig_bottom" {% if settings.public_ui_style == 'ig_bottom' %}selected{% endif %}>Bottom navigation</option>
        <option value="side_dock" {% if settings.public_ui_style == 'side_dock' %}selected{% endif %}>Side navigation</option>
      </select>
    </label>
    <label>Default theme
      <select name="site_theme">
        <option value="theme-sunset" {% if settings.site_theme == 'theme-sunset' %}selected{% endif %}>Current color</option>
        <option value="theme-midnight" {% if settings.site_theme == 'theme-midnight' %}selected{% endif %}>Black UI</option>
        <option value="theme-paper" {% if settings.site_theme == 'theme-paper' %}selected{% endif %}>Paper</option>
        <option value="theme-ocean" {% if settings.site_theme == 'theme-ocean' %}selected{% endif %}>Blue</option>
        <option value="theme-forest" {% if settings.site_theme == 'theme-forest' %}selected{% endif %}>Green</option>
        <option value="theme-restyle" {% if settings.site_theme == 'theme-restyle' %}selected{% endif %}>Restyle</option>
      </select>
    </label>
    <label>Default font
      <select name="site_font">
        <option value="font-system" {% if settings.site_font == 'font-system' %}selected{% endif %}>System</option>
        <option value="font-sans" {% if settings.site_font == 'font-sans' %}selected{% endif %}>Modern sans</option>
        <option value="font-serif" {% if settings.site_font == 'font-serif' %}selected{% endif %}>Serif</option>
        <option value="font-rounded" {% if settings.site_font == 'font-rounded' %}selected{% endif %}>Rounded</option>
      </select>
    </label>
    <label>Upload logo<input name="brand_logo" type="file" accept="image/*"></label>
    <label>Upload business card<input name="business_card_image" type="file" accept="image/*"></label>
    <button class="cta-button" type="submit">Save settings</button>
  </form>
</div>
{% endblock %}
