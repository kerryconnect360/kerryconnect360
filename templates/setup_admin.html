{% extends 'base.html' %}
{% block title %}First admin setup | {{ brand.site_name if brand else 'Book with Kerrie' }}{% endblock %}
{% block content %}
<section class="card page-head auth-card">
  <p class="eyebrow">First admin</p>
  <h1>Create the first admin account.</h1>
  <p class="lead">After this, only log in remains for admin access.</p>
</section>

<section class="card form-card auth-card">
  <form method="post" class="stack-form">
    <label>Full name<input name="full_name" required></label>
    <label>Username<input name="username" required></label>
    <label>Password<input type="password" name="password" required></label>
    <label>Confirm password<input type="password" name="confirm_password" required></label>
    <button class="btn primary" type="submit">Create admin</button>
  </form>
</section>
{% endblock %}
