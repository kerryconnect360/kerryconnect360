
{% extends 'admin/base.html' %}
{% block content %}
<div class="two-column">
  <section class="panel admin-panel">
    <div class="section-headline">Add admin</div>
    <form method="post" class="stack-form">
      <label>Full name<input name="full_name" required></label>
      <label>Email<input name="email" type="email" required></label>
      <label>Phone<input name="phone"></label>
      <label>Password<input name="password" type="password" required></label>
      <button class="cta-button" type="submit">Add admin</button>
    </form>
  </section>
  <section class="panel admin-panel">
    <div class="section-headline">Admins</div>
    <div class="admin-list">
      {% for admin in admins %}
      <article class="admin-row admin-row--stack">
        <div>
          <strong>{{ admin.full_name }}</strong>
          <small>{{ admin.email }}{% if admin.phone %} · {{ admin.phone }}{% endif %}</small>
        </div>
      </article>
      {% else %}
      <article class="admin-row admin-row--stack empty-state"><strong>No admins yet</strong><small>Add one from the form.</small></article>
      {% endfor %}
    </div>
  </section>
</div>
{% endblock %}
