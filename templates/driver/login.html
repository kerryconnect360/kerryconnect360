
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driver entry</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="ops-body">
  <main class="ops-shell">
    <section class="ops-card panel">
      <span class="eyebrow">Driver portal</span>
      <h1>Driver login</h1>
      <p>Added drivers can sign in and see the live queue from here.</p>
      <form method="post" class="ops-form">
        <label>Login name<input name="login_name" required></label>
        <label>Password<input name="password" type="password" required></label>
        <button class="cta-button" type="submit">Open dashboard</button>
      </form>
    </section>
  </main>
</body>
</html>
