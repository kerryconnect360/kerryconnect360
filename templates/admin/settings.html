
{% extends 'admin/base.html' %}
{% block content %}
<div class="panel admin-panel">
  <div class="section-headline">Public brand settings</div>
  <form method="post" enctype="multipart/form-data" class="stack-form settings-form">
    <label>Brand name<input name="brand_name" value="{{ settings.brand_name }}" required></label>
    <label>Brand tagline<textarea name="brand_tagline" rows="2" required>{{ settings.brand_tagline }}</textarea></label>
    <label>Support phone<input name="support_phone" value="{{ settings.support_phone }}" required></label>
    <label>Support email<input name="support_email" value="{{ settings.support_email }}" required></label>
    <label>About text<textarea name="about_text" rows="3" required>{{ settings.about_text }}</textarea></label>
    <label>Business card text<textarea name="business_card_text" rows="2" required>{{ settings.business_card_text }}</textarea></label>
    <label>QR label<input name="qr_label" value="{{ settings.qr_label }}" required></label>
    <label>Upload logo<input name="brand_logo" type="file" accept="image/*"></label>
    <label>Upload business card<input name="business_card_image" type="file" accept="image/*"></label>
    <button class="cta-button" type="submit">Save settings</button>
  </form>
</div>
{% endblock %}
